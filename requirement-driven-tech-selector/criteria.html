<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Criteria</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>

<header>
  <div class="wrap" id="topNav"></div>
  <div class="wrap">
    <h1 id="pageTitle"></h1>
    <p class="muted" id="pageSubtitle"></p>
  </div>
</header>

<main class="wrap">

  <!-- Macro selector -->
  <div class="card" style="margin-bottom:12px;">
    <div class="controls">

      <div>
        <div class="tiny muted" id="macroLbl"></div>
        <select id="macroSelect"></select>
      </div>

      <div>
        <div class="tiny muted" id="macroHint"></div>
        <span class="badge" id="macroBadge">—</span>
      </div>

    </div>
  </div>


  <div class="card">
    <h2 id="critH2"></h2>
    <div id="critTable"></div>
  </div>


<script type="module">

import { MACROS, loadMacro } from "./app/loader.js";
import { pick, t, getLang } from "./app/i18n.js";
import { setTitle, criterionLabel } from "./app/render.js";


//URL helpers

function getParam(name, fallback=null)
{
  const u = new URL(window.location.href);
  return u.searchParams.get(name) ?? fallback;
}

function setParam(name, value)
{
  const u = new URL(window.location.href);
  u.searchParams.set(name, value);
  window.location.href = u.toString();
}


//UI texts

setTitle("pageTitle", {en:"Criteria", it:"Criteri"});

document.getElementById("critH2").textContent =
  t({en:"Definitions", it:"Definizioni"});

document.getElementById("macroLbl").textContent =
  t({en:"Macro-area", it:"Macro-area"});

document.getElementById("macroHint").textContent =
  t({
    en:"Choose which criteria set to display.",
    it:"Scegli quali criteri visualizzare."
  });


//Macro selector

const macroSelect = document.getElementById("macroSelect");
const macroBadge = document.getElementById("macroBadge");


const options = [

  {
    id:"performance",
    label:t({
      en:"Performance & Scalability",
      it:"Performance e Scalabilità"
    })
  },

  {
    id:"architecture",
    label:t({
      en:"Architecture, Governance & Security",
      it:"Architettura, governance e sicurezza"
    })
  },

  {
    id:"economic",
    label:t({
      en:"Economic Sustainability",
      it:"Sostenibilità economica"
    })
  },

  {
    id:"reliability",
    label:t({
      en:"Reliability, Continuity & Integrity",
      it:"Affidabilità, continuità e integrità"
    })
  }

];



for (const opt of options)
{
  const o = document.createElement("option");

  o.value = opt.id;
  o.textContent = opt.label;

  macroSelect.appendChild(o);
}


const activeMacro = getParam("macro","performance");

macroSelect.value = activeMacro;

macroBadge.textContent =
  options.find(o=>o.id===activeMacro)?.label
  || activeMacro;


macroSelect.addEventListener("change",
  () => setParam("macro",macroSelect.value)
);



//Load criteria

const lang = getLang();

let criteria;

try
{
  const loaded = await loadMacro(activeMacro);

  criteria = loaded.criteria;
}
catch(err)
{
  document.getElementById("pageSubtitle").textContent =
    t({
      en:"Error loading criteria",
      it:"Errore caricamento criteri"
    });

  throw err;
}



//Subtitle

const labelEn =
  criteria?.macro_area?.label_en
  || MACROS[activeMacro]?.label
  || activeMacro;

const labelIt =
  criteria?.macro_area?.label_it
  || labelEn;


document.getElementById("pageSubtitle").textContent =
  t({
    en:`Macro-area: ${labelEn}`,
    it:`Macro-area: ${labelIt}`
  });



//Table

const wrap = document.getElementById("critTable");

wrap.innerHTML="";


const table = document.createElement("table");

table.innerHTML = `

<thead>

<tr>

<th>${t({en:"Criterion",it:"Criterio"})}</th>

<th>ID</th>

<th>${t({en:"Type",it:"Tipo"})}</th>

<th>${t({en:"Description",it:"Descrizione"})}</th>

<th>${t({en:"Metric & Formula",it:"Metrica e formula"})}</th>

<th>${t({en:"Parameterization",it:"Parametrizzazione"})}</th>

</tr>

</thead>

<tbody></tbody>

`;


const tb = table.querySelector("tbody");



const rangeText = obj =>
{

  if(!obj) return "";

  return t({

    en:obj.range_text_en ?? obj.range ?? "",

    it:obj.range_text_it ?? obj.range ?? ""

  });

};



for(const c of (criteria.criteria || []))
{

  const tr=document.createElement("tr");


  const p=c.parameterization || {};


  const par=["LOW","MID","HIGH"].map(L=>`

  <div>

    <span class="badge">${L}</span>

    ${rangeText(p[L])}

  </div>

  `).join("");



  const m=c.metric || {};
  const f=c.formula || {};


  const metricLine = m.name_en
    ? `<div><b>${t({en:m.name_en,it:m.name_it})}</b></div>`
    : "";


  const formulaLine =
    f.latex
    ? `<div><code>${f.latex}</code></div>`
    : "";



  tr.innerHTML=`

<td><b>${criterionLabel(c)}</b></td>

<td><code>${c.id}</code></td>

<td><span class="badge">${c.measurement_type || ""}</span></td><td><span class="badge">${c.direction || c.type || ""}</span></td>

<td>${pick(c,"description")||""}</td>

<td>${metricLine}${formulaLine}</td>

<td>${par}</td>

`;



  tb.appendChild(tr);

}


wrap.appendChild(table);


</script>


</main>


<footer class="wrap tiny muted">

Tech-Selector

</footer>



<script type="module">

import { nav } from "./app/render.js";

import { attachLangSelector } from "./app/i18n.js";


document.getElementById("topNav")
.appendChild(nav("criteria.html"));


attachLangSelector("langSelect");


</script>


</body>

</html>
