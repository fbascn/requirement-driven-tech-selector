<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Run</title>
  <link rel="stylesheet" href="./styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body>
  <header>
    <div class="wrap" id="topNav"></div>
    <div class="wrap">
      <h1 id="pageTitle"></h1>
      <p class="muted" id="pageSubtitle"></p>
    </div>
  </header>

  <main class="wrap">

    <!-- Macro selector -->
    <div class="card" style="margin-bottom:12px;">
      <div class="controls">
        <div style="min-width:260px;">
          <div class="tiny muted" id="macroLbl"></div>
          <select id="macroSelect"></select>
        </div>
        <div>
          <div class="tiny muted" id="macroHint"></div>
          <span class="badge" id="macroBadge">—</span>
        </div>
      </div>
    </div>

    <div class="grid">

      <!--Questions -->
      <section>
        <div class="card">
          <div class="controls" style="align-items:center;">
            <div>
              <h2 style="margin:0;" id="questionsTitle"></h2>
              <div class="tiny muted" id="wHint"></div>
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
              <button id="preset" class="pill">Preset MID</button>
              <button id="compute" class="pill active" style="border:0;">Compute</button>
            </div>
          </div>
        </div>

        <div id="form" style="margin-top:10px;"></div>
      </section>

      <!-- Results + charts -->
      <section>
        <div class="card">
          <div class="controls" style="align-items:center;">
            <h2 style="margin-top:0; margin-bottom:0;" id="rankingTitle"></h2>
            <div style="display:flex; gap:8px; align-items:center;">
              <button id="openHeatmap" class="pill" style="display:none;">Heatmap</button>
            </div>
          </div>

          <div class="muted" id="empty">Caricamento…</div>
          <div id="ranking"></div>

          <details style="margin-top:12px;">
            <summary id="debugTitle"></summary>
            <pre id="debug" style="white-space:pre-wrap;"></pre>
          </details>
        </div>

        <!-- Radar + Bar block -->
        <div id="visualBlock" style="margin-top:12px;">
          <!-- Radar -->
          <div class="card">
            <div class="controls" style="align-items:center;">
              <div>
                <div class="tiny muted" id="radarTitle"></div>
                <div class="tiny muted" id="radarStatus"></div>
              </div>
              <div style="display:flex; gap:8px; align-items:center;">
                <select id="radarMode" class="select">
                  <option value="top3">Top 3</option>
                  <option value="top5">Top 5</option>
                  <option value="custom">Custom</option>
                </select>
                <button id="applySelection" class="pill">Apply</button>
              </div>
            </div>

            <div class="grid" style="grid-template-columns: 1fr; gap:10px; margin-top:10px;">
              <div>
                <div class="tiny muted" id="compareTitle"></div>
                <div id="compareList"></div>
              </div>
              <div>
                <canvas id="radar" height="220"></canvas>
                <div id="legendList" style="margin-top:10px;"></div>
              </div>
            </div>
          </div>

          <!-- Bar -->
          <div class="card" style="margin-top:12px;">
            <div class="controls" style="align-items:center;">
              <div>
                <div class="tiny muted" id="barTitle"></div>
              </div>
              <div style="display:flex; gap:8px; align-items:center;">
                <select id="barTechSelect" class="select"></select>
              </div>
            </div>
            <canvas id="bar" height="220" style="margin-top:10px;"></canvas>
          </div>
        </div>
      </section>

    </div>

    <div id="err" class="card" style="display:none; margin-top:12px;">
      <h2 id="errTitle"></h2>
      <div class="tiny muted" id="errMsg"></div>
      <pre id="errDetails" style="white-space:pre-wrap;"></pre>
    </div>

<script type="module">
  import { MACROS, loadMacro, validateTechFiles } from "./app/loader.js";
  import { attachLangSelector, getLang, t } from "./app/i18n.js";
  import { nav, setTitle, criterionLabel } from "./app/render.js";
  import { computeRanking } from "./app/scoring.js";
  import { makeRadar } from "./app/radar.js";
  import { makeBar } from "./app/bar.js";

  validateTechFiles();

// Top nav + language selector
  document.getElementById("topNav").appendChild(nav("run.html"));
  attachLangSelector("langSelect");

  const lang = getLang();

// Helpers: URL params
  function getParam(name, fallback = null) {
    const u = new URL(window.location.href);
    return u.searchParams.get(name) ?? fallback;
  }
  function setParam(name, value) {
    const u = new URL(window.location.href);
    u.searchParams.set(name, value);
    window.location.href = u.toString();
  }

// UI texts
  setTitle("pageTitle", { en: "Run", it: "Esecuzione" });
  document.getElementById("macroLbl").textContent = t({ en:"Macro-area", it:"Macro-area" });
  document.getElementById("macroHint").textContent = t({ en:"URL parameter: macro", it:"Parametro URL: macro" });
  document.getElementById("questionsTitle").textContent = t({ en:"Questions", it:"Domande" });
  document.getElementById("rankingTitle").textContent = t({ en:"Ranking", it:"Classifica" });
  document.getElementById("debugTitle").textContent = t({ en:"Debug scoring (details)", it:"Debug calcolo (dettagli)" });
  document.getElementById("radarTitle").textContent = t({ en:"Radar comparison", it:"Confronto radar" });
  document.getElementById("compareTitle").textContent = t({ en:"Select technologies to compare", it:"Seleziona tecnologie da confrontare" });
  document.getElementById("barTitle").textContent = t({ en:"Bar explanation (one technology)", it:"Spiegazione a barre (una tecnologia)" });

  const errBox = document.getElementById("err");
  function showError(title, msg, details="") {
    errBox.style.display = "block";
    document.getElementById("errTitle").textContent = title;
    document.getElementById("errMsg").textContent = msg;
    document.getElementById("errDetails").textContent = details;
  }

// Macro selector options
  const macroSelect = document.getElementById("macroSelect");
  const macroBadge = document.getElementById("macroBadge");

  const options = [
    { id: "performance",   label: MACROS.performance?.label   || "Performance & Scalability" },
    { id: "architecture",  label: MACROS.architecture?.label  || "Architecture, Governance and Security" },
    { id: "economic",      label: MACROS.economic?.label      || "Economic Sustainability" },
    { id: "reliability",   label: MACROS.reliability?.label   || "Reliability, Continuity & Integrity" },
    { id: "overall",       label: t({ en:"Overall", it:"Complessivo" }) }
  ];

  for (const opt of options) {
    const o = document.createElement("option");
    o.value = opt.id;
    o.textContent = opt.label;
    macroSelect.appendChild(o);
  }

  const macroParam = getParam("macro", "performance");
  const activeMacro = (macroParam === "overall" || MACROS[macroParam]) ? macroParam : "performance";

  macroSelect.value = activeMacro;
  macroBadge.textContent = activeMacro;
  macroSelect.addEventListener("change", () => setParam("macro", macroSelect.value));

  document.getElementById("pageSubtitle").textContent =
    (activeMacro === "overall")
      ? t({ en:"Run — Overall (all macro-areas)", it:"Esecuzione — Complessivo (tutte le macro-aree)" })
      : `Run — ${options.find(x=>x.id===activeMacro)?.label || activeMacro}`;

  const heatBtn = document.getElementById("openHeatmap");
  if (heatBtn) {
    heatBtn.style.display = "inline-flex";
    heatBtn.textContent = "Heatmap";
    heatBtn.addEventListener("click", () => {
      window.location.href = `./heatmap.html?macro=${encodeURIComponent(activeMacro)}`;
    });
  }

// State
  let criteria = null, questions = null, benchmarks = null;
  let macrosLoaded = null;
  let lastResult = null;
  let lastMode = null;

  let radarChart = null;
  let barChart = null;

// Load data
  try {
    if (activeMacro === "overall") {
      const ids = ["performance", "architecture", "economic", "reliability"];
      const packs = await Promise.all(ids.map(id => loadMacro(id)));
      macrosLoaded = packs.map((p, i) => ({
        id: ids[i],
        label: MACROS[ids[i]]?.label || ids[i],
        criteria: p.criteria,
        questions: p.questions,
        benchmarks: p.benchmarks
      }));
    } else {
      ({ criteria, questions, benchmarks } = await loadMacro(activeMacro));
    }
  } catch (err) {
    showError(
      t({en:"Data load failed", it:"Caricamento dati fallito"}),
      t({en:"Could not load macro-area JSON files from ./data", it:"Impossibile caricare i file JSON della macro-area da ./data"}),
      String(err?.stack || err)
    );
    throw err;
  }

//FORM BUILDERS
  const form = document.getElementById("form");

  function buildFormSingle(criteriaObj, questionsObj) {
    if (!questionsObj?.questions || !Array.isArray(questionsObj.questions)) {
      throw new Error(`buildFormSingle: invalid questionsObj (missing questions array)`);
    }
    const qBy = new Map(questionsObj.questions.map(q => [q.criterion_id, q]));
    const wrap = document.createElement("div");

    const hint =
      questionsObj.weight?.[`prompt_${lang}`] ||
      (lang==="it" ? questionsObj.weight?.prompt_it : questionsObj.weight?.prompt_en) ||
      "";

    for (const c of criteriaObj.criteria) {
      const q = qBy.get(c.id);

      const card = document.createElement("div");
      card.className = "card";
      card.style.marginTop = "10px";

      const qTitle =
        q?.[`question_${lang}`] ||
        (lang==="it" ? q?.question_it : q?.question_en) ||
        criterionLabel(c);

      const qHelp =
        q?.[`help_${lang}`] ||
        (lang==="it" ? q?.help_it : q?.help_en) ||
        "";

      card.innerHTML = `
        <div><b>${qTitle}</b></div>
        <div class="tiny muted">${qHelp}</div>
        <div class="tiny muted" style="margin-top:6px;">
          <span class="badge">${c.type}</span>
          <span style="margin-left:8px;">${t({en:"Criterion", it:"Criterio"})}: <b>${criterionLabel(c)}</b></span>
        </div>
      `;

      const answersWrap = document.createElement("div");
      answersWrap.style.marginTop = "10px";

      const answers = q?.answers || [
        { level:"LOW",  label_en:"LOW",  label_it:"LOW" },
        { level:"MID",  label_en:"MID",  label_it:"MID" },
        { level:"HIGH", label_en:"HIGH", label_it:"HIGH" }
      ];

      for (const a of answers) {
        const line = document.createElement("label");
        line.className = "compare-item";
        line.style.borderTop = "0";
        line.style.padding = "8px 0";
        const txt = a[`label_${lang}`] || a.label_en || a.label_it || a.level;
        line.innerHTML = `
          <input type="radio" name="d_${c.id}" value="${a.level}" ${a.level==="MID" ? "checked" : ""} />
          <span><b>${a.level}</b> — ${txt}</span>
        `;
        answersWrap.appendChild(line);
      }

      card.appendChild(answersWrap);

      const wRow = document.createElement("div");
      wRow.className = "controls";
      wRow.style.marginTop = "10px";
      wRow.innerHTML = `
        <div>
          <div class="tiny muted">${t({en:"Importance (weight rᵢ)", it:"Importanza (peso rᵢ)"})}</div>
        </div>
      `;

      const weightInp = document.createElement("input");
      weightInp.type = "number";
      weightInp.min = "1";
      weightInp.max = "5";
      weightInp.step = "1";
      weightInp.value = String(questionsObj.weight?.default ?? 3);
      weightInp.dataset.criterion = c.id;
      weightInp.dataset.kind = "weight";
      wRow.children[0].appendChild(weightInp);

      card.appendChild(wRow);
      wrap.appendChild(card);
    }

    return { wrap, qBy, hint };
  }

  function buildFormOverall(macrosArray) {
    form.innerHTML = "";
    const blocks = {};

    for (const m of macrosArray) {
      const title = document.createElement("div");
      title.className = "card";
      title.style.marginTop = "10px";
      title.innerHTML = `<b>${m.label}</b><div class="tiny muted">${t({en:"Macro-area questions", it:"Domande macro-area"})}</div>`;
      form.appendChild(title);

      const built = buildFormSingle(m.criteria, m.questions);
      form.appendChild(built.wrap);

      blocks[m.id] = {
        criteria: m.criteria,
        questions: m.questions,
        benchmarks: m.benchmarks,
        qBy: built.qBy
      };
    }
    return blocks;
  }

  let qBy = null;
  let overallBlocks = null;

  if (activeMacro === "overall") {
    overallBlocks = buildFormOverall(macrosLoaded);
    document.getElementById("wHint").textContent = t({
      en:"Fill all macro-areas, then Compute to obtain the overall ranking.",
      it:"Compila tutte le macro-aree, poi Calcola per ottenere il ranking complessivo."
    });
  } else {
    const built = buildFormSingle(criteria, questions);
    form.innerHTML = "";
    form.appendChild(built.wrap);
    qBy = built.qBy;
    document.getElementById("wHint").textContent = built.hint || "";
  }

//USER PROFILE READING
  const MAP = { LOW: 0, MID: 1, HIGH: 2 };
  const invertLevel = (L) => (L === "LOW" ? "HIGH" : (L === "HIGH" ? "LOW" : "MID"));

  function readUserSingle(criteriaObj, qByLocal) {
    const desired = {};
    const weight = {};

    for (const c of criteriaObj.criteria) {
      const sel = document.querySelector(`input[type="radio"][name="d_${c.id}"]:checked`);
      const inp = document.querySelector(`input[data-criterion="${c.id}"][data-kind="weight"]`);
      const q = qByLocal.get(c.id);

      let level = sel?.value || "MID";
      if (q?.desired_mapping === "INVERT_LEVELS") level = invertLevel(level);

      desired[c.id] = MAP[level] ?? 1;

      const wRaw = parseInt(inp?.value ?? "3", 10);
      const wBase = Number.isFinite(wRaw) ? wRaw : 3;
      weight[c.id] = Math.max(1, Math.min(5, wBase));
    }
    return { desired, weight };
  }

  function mergeCriteria(macros) {
    return { criteria: macros.flatMap(m => m.criteria.criteria) };
  }

  function mergeBenchmarks(macros) {
    const byTech = new Map();
    for (const m of macros) {
      for (const tech of m.benchmarks.technologies) {
        const existing = byTech.get(tech.id) || { id: tech.id, label: tech.label, values: {} };
        Object.assign(existing.values, tech.values || {});
        existing.label = existing.label || tech.label;
        byTech.set(tech.id, existing);
      }
    }
    return { technologies: [...byTech.values()] };
  }

  function mergeUser(blocks) {
    const desired = {};
    const weight = {};
    for (const blk of Object.values(blocks)) {
      const u = readUserSingle(blk.criteria, blk.qBy);
      Object.assign(desired, u.desired);
      Object.assign(weight, u.weight);
    }
    return { desired, weight };
  }

//PRESET
  document.getElementById("preset").addEventListener("click", () => {
    const radios = document.querySelectorAll(`input[type="radio"][value="MID"]`);
    radios.forEach(r => r.checked = true);
    const weights = document.querySelectorAll(`input[data-kind="weight"]`);
    weights.forEach(w => w.value = "3");
  });

//RENDER RANKING
  function renderRanking(result, badge="") {
    document.getElementById("empty").style.display = "none";
    const rankWrap = document.getElementById("ranking");
    rankWrap.innerHTML = "";

    const table = document.createElement("table");
    table.innerHTML = `
      <thead>
        <tr>
          <th>${t({en:"Technology", it:"Tecnologia"})} ${badge ? `<span class="badge">${badge}</span>` : ""}</th>
          <th>${t({en:"Score", it:"Punteggio"})}</th>
        </tr>
      </thead>
      <tbody></tbody>
    `;
    const tb = table.querySelector("tbody");

    for (const r of result.ranking) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><b>${r.label}</b></td>
        <td><span class="badge">${Math.round(r.score * 100)}/100</span></td>
      `;
      tb.appendChild(tr);
    }

    rankWrap.appendChild(table);
    document.getElementById("debug").textContent = JSON.stringify(result.debug, null, 2);
    lastResult = result;
  }

  // ---------- VISUALS ----------
  const radarMode = document.getElementById("radarMode");
  const compareList = document.getElementById("compareList");
  const applySelection = document.getElementById("applySelection");
  const radarStatus = document.getElementById("radarStatus");
  const legendList = document.getElementById("legendList");
  const barTechSelect = document.getElementById("barTechSelect");

  const MAX_SELECTED = 6;

  function renderCompareList(ranking) {
    compareList.innerHTML = "";
    for (const r of ranking) {
      const item = document.createElement("label");
      item.className = "compare-item";
      item.innerHTML = `
        <input type="checkbox" data-tech="${r.tech_id}" />
        <span><b>${r.label}</b> <span class="badge">${Math.round(r.score * 100)}/100</span></span>
      `;
      compareList.appendChild(item);
    }
  }

  function setCheckedTopK(k) {
    const boxes = [...compareList.querySelectorAll('input[type="checkbox"]')];
    boxes.forEach((b, idx) => { b.checked = idx < k; });
  }

  function getSelectedTechIds() {
    const boxes = [...compareList.querySelectorAll('input[type="checkbox"]:checked')];
    return boxes.map(b => b.dataset.tech);
  }

  function renderLegend(userLabel, techRows) {
    legendList.innerHTML = "";

    const userItem = document.createElement("div");
    userItem.className = "legend-item";
    userItem.innerHTML = `<span><b>${userLabel}</b></span><span class="badge">profile</span>`;
    legendList.appendChild(userItem);

    for (const row of techRows) {
      const item = document.createElement("div");
      item.className = "legend-item";
      item.innerHTML = `<span><b>${row.label}</b></span><span class="badge">${Math.round(row.score*100)}/100</span>`;
      legendList.appendChild(item);
    }
  }

  function populateBarSelectFromRanking(ranking) {
    barTechSelect.innerHTML = "";
    for (const r of ranking) {
      const opt = document.createElement("option");
      opt.value = r.tech_id;
      opt.textContent = r.label;
      barTechSelect.appendChild(opt);
    }
  }

  function buildOverallVizData(perMacroResults, overallBlocksLocal) {
    const overallCriteria = {
      criteria: [
        { id:"m_performance",  type:"UP", label_en:"Performance & Scalability",            label_it:"Performance e Scalabilità" },
        { id:"m_architecture", type:"UP", label_en:"Architecture, Governance & Security",  label_it:"Architettura, governance e sicurezza" },
        { id:"m_economic",     type:"UP", label_en:"Economic Sustainability",              label_it:"Sostenibilità economica" },
        { id:"m_reliability",  type:"UP", label_en:"Reliability, Continuity & Integrity",  label_it:"Affidabilità, continuità e integrità" },
      ]
    };

    function userMacroAvg(macroId) {
      const blk = overallBlocksLocal[macroId];
      const u = readUserSingle(blk.criteria, blk.qBy);

      let num = 0, den = 0;
      for (const c of blk.criteria.criteria) {
        const w = u.weight[c.id] || 1;
        num += w * (u.desired[c.id] ?? 1);
        den += w;
      }
      const avg = den ? (num / den) : 1;
      return Math.max(0, Math.min(2, Math.round(avg)));
    }

    const user = {
      desired: {
        m_performance:  userMacroAvg("performance"),
        m_architecture: userMacroAvg("architecture"),
        m_economic:     userMacroAvg("economic"),
        m_reliability:  userMacroAvg("reliability")
      },
      weight: {
        m_performance:3, m_architecture:3, m_economic:3, m_reliability:3
      }
    };

    function scoreToLevel(s) {
      if (s < 1/3) return "LOW";
      if (s < 2/3) return "MID";
      return "HIGH";
    }

    const techList = [];
    const baseRanking = perMacroResults.performance?.ranking || perMacroResults.architecture?.ranking || [];

    for (const row of baseRanking) {
      const id = row.tech_id;
      const label = row.label;

      const sP = perMacroResults.performance?.ranking.find(x=>x.tech_id===id)?.score ?? 0;
      const sA = perMacroResults.architecture?.ranking.find(x=>x.tech_id===id)?.score ?? 0;
      const sE = perMacroResults.economic?.ranking.find(x=>x.tech_id===id)?.score ?? 0;
      const sR = perMacroResults.reliability?.ranking.find(x=>x.tech_id===id)?.score ?? 0;

      techList.push({
        id,
        label,
        values: {
          m_performance:  scoreToLevel(sP),
          m_architecture: scoreToLevel(sA),
          m_economic:     scoreToLevel(sE),
          m_reliability:  scoreToLevel(sR)
        }
      });
    }

    const vizBenchmarks = { technologies: techList };
    return { overallCriteria, user, vizBenchmarks };
  }

  function getTechFromBenchmarks(bench, techId) {
    return bench.technologies.find(t => t.id === techId);
  }

  function updateRadar(criteriaObj, userObj, benchObj, ranking) {
    let techIds = [];
    if (radarMode.value === "top3") techIds = ranking.slice(0,3).map(x => x.tech_id);
    else if (radarMode.value === "top5") techIds = ranking.slice(0,5).map(x => x.tech_id);
    else techIds = getSelectedTechIds();

    const requested = techIds.length;
    if (techIds.length > MAX_SELECTED) techIds = techIds.slice(0, MAX_SELECTED);

    const techList = techIds.map(id => getTechFromBenchmarks(benchObj, id)).filter(Boolean);

    const ctx = document.getElementById("radar").getContext("2d");
    if (radarChart) radarChart.destroy();
    radarChart = makeRadar(ctx, criteriaObj, userObj, techList);

    const techRows = techIds.map(id => ranking.find(x=>x.tech_id===id)).filter(Boolean);
    renderLegend(t({en:"User", it:"Utente"}), techRows);

    const shown = techIds.length;
    const trunc = requested > shown
      ? ` — ${t({en:"showing", it:"mostro"})} ${shown}/${requested} (${t({en:"max", it:"max"})} ${MAX_SELECTED})`
      : "";
    radarStatus.textContent = `${t({en:"Radar lines", it:"Linee radar"})}: ${shown}${trunc}`;
  }

  function updateBar(criteriaObj, userObj, benchObj, ranking) {
    const techId = barTechSelect.value || ranking[0]?.tech_id;
    const tech = getTechFromBenchmarks(benchObj, techId);
    if (!tech) return;

    const ctx = document.getElementById("bar").getContext("2d");
    if (barChart) barChart.destroy();
    barChart = makeBar(ctx, criteriaObj, userObj, tech);
  }

  applySelection.addEventListener("click", () => {
    if (!lastResult) return;
    if (lastMode === "overall") {
      const pack = lastResult.debug.__vizPack;
      updateRadar(pack.criteria, pack.user, pack.benchmarks, lastResult.ranking);
    } else {
      updateRadar(criteria, lastResult.debug.user, benchmarks, lastResult.ranking);
    }
  });

  radarMode.addEventListener("change", () => {
    if (!lastResult) return;
    if (radarMode.value === "top3") setCheckedTopK(3);
    if (radarMode.value === "top5") setCheckedTopK(5);

    if (lastMode === "overall") {
      const pack = lastResult.debug.__vizPack;
      updateRadar(pack.criteria, pack.user, pack.benchmarks, lastResult.ranking);
    } else {
      updateRadar(criteria, lastResult.debug.user, benchmarks, lastResult.ranking);
    }
  });

  barTechSelect.addEventListener("change", () => {
    if (!lastResult) return;
    if (lastMode === "overall") {
      const pack = lastResult.debug.__vizPack;
      updateBar(pack.criteria, pack.user, pack.benchmarks, lastResult.ranking);
    } else {
      updateBar(criteria, lastResult.debug.user, benchmarks, result.ranking);
    }
  });

// COMPUTE 
  document.getElementById("compute").addEventListener("click", () => {
    try {
      if (activeMacro === "overall") {
        const perMacro = {};
        for (const [mid, blk] of Object.entries(overallBlocks)) {
          const userM = readUserSingle(blk.criteria, blk.qBy);
          perMacro[mid] = computeRanking(blk.criteria, userM, blk.benchmarks);
        }

        const mergedCriteria = mergeCriteria(macrosLoaded);
        const mergedUser = mergeUser(overallBlocks);

        sessionStorage.setItem("techSelector:userProfile:overall", JSON.stringify(mergedUser));

        const mergedBenchmarks = mergeBenchmarks(macrosLoaded);
        const overallResult = computeRanking(mergedCriteria, mergedUser, mergedBenchmarks);

        const vizPack = buildOverallVizData(perMacro, overallBlocks);
        overallResult.debug.per_macro = Object.fromEntries(
          Object.entries(perMacro).map(([k,v]) => [k, v.ranking])
        );
        overallResult.debug.__vizPack = {
          criteria: vizPack.overallCriteria,
          user: vizPack.user,
          benchmarks: vizPack.vizBenchmarks
        };

        renderRanking(overallResult, "overall");
        lastMode = "overall";

        renderCompareList(overallResult.ranking);
        radarMode.value = "top3";
        setCheckedTopK(3);

        populateBarSelectFromRanking(overallResult.ranking);
        barTechSelect.value = overallResult.ranking[0]?.tech_id || barTechSelect.value;

        updateRadar(vizPack.overallCriteria, vizPack.user, vizPack.vizBenchmarks, overallResult.ranking);
        updateBar(vizPack.overallCriteria, vizPack.user, vizPack.vizBenchmarks, overallResult.ranking);
        return;
      }

// SINGLE MACRO
      const user = readUserSingle(criteria, qBy);

      sessionStorage.setItem(`techSelector:userProfile:${activeMacro}`, JSON.stringify(user));

      const result = computeRanking(criteria, user, benchmarks);

      renderRanking(result, activeMacro);
      lastMode = "single";

      renderCompareList(result.ranking);
      radarMode.value = "top3";
      setCheckedTopK(3);

      populateBarSelectFromRanking(result.ranking);
      barTechSelect.value = result.ranking[0]?.tech_id || barTechSelect.value;

      updateRadar(criteria, result.debug.user, benchmarks, result.ranking);
      updateBar(criteria, result.debug.user, benchmarks, result.ranking);

    } catch (err) {
      showError(
        t({en:"Compute failed", it:"Calcolo fallito"}),
        String(err?.message || err),
        String(err?.stack || err)
      );
    }
  });

// Initial state
  document.getElementById("empty").style.display = "none";
  document.getElementById("ranking").innerHTML =
    `<div class="muted">${t({en:"Set answers and press Compute.", it:"Imposta le risposte e premi Calcola."})}</div>`;
  document.getElementById("debug").textContent = "";
</script>

  </main>
</body>
